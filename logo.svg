<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a1a1e"/>

  <!-- Outer compass ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#d4913b" stroke-width="8"/>

  <!-- North tick (prominent) -->
  <line x1="256" y1="20" x2="256" y2="82" stroke="#d4913b" stroke-width="10"/>
  <!-- East tick -->
  <line x1="492" y1="256" x2="430" y2="256" stroke="#d4913b" stroke-width="6" opacity="0.4"/>
  <!-- South tick -->
  <line x1="256" y1="492" x2="256" y2="430" stroke="#d4913b" stroke-width="6" opacity="0.4"/>
  <!-- West tick -->
  <line x1="20" y1="256" x2="82" y2="256" stroke="#d4913b" stroke-width="6" opacity="0.4"/>

  <!-- Compass needle (rotated 30°) -->
  <g transform="rotate(30 256 256)">
    <!-- North right half (darker amber) -->
    <path d="M256 61 L307 256 L256 282Z" fill="#d4913b"/>
    <!-- North left half (lighter gold) -->
    <path d="M256 61 L205 256 L256 282Z" fill="#e8a84c"/>
    <!-- South right half (muted) -->
    <path d="M256 282 L307 256 L256 451Z" fill="#d4913b" opacity="0.25"/>
    <!-- South left half (muted) -->
    <path d="M256 282 L205 256 L256 451Z" fill="#d4913b" opacity="0.25"/>
  </g>

  <!-- Center hub (dark circle with amber stroke, no inner dot) -->
  <circle cx="256" cy="256" r="20" fill="#1a1a1e" stroke="#d4913b" stroke-width="5"/>
</svg>
